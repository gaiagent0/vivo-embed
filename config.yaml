## vivo-embed - Magyar Embedding Indexer Agent
## Port: 7272 | ChromaDB | Ollama bge-m3 (lokalis, nincs quota)
## AKTIV EMBEDDER: ollama

embedder: ollama

ollama:
  base_url: http://localhost:11434
  model: bge-m3
  dimensions: 1024
  batch_size: 50

google:
  api_key_env: GOOGLE_API_KEY
  model: gemini-embedding-001
  dimensions: 3072
  batch_size: 20
  task_type_doc: RETRIEVAL_DOCUMENT
  task_type_query: RETRIEVAL_QUERY

chroma:
  persist_path: C:\AI\data\vivo-embed\chroma
  collections:
    - docs
    - code
    - notes
    - system
    - web

crawler:
  scan_drives: none
  exclude_dirs:
    - Windows
    - "$Recycle.Bin"
    - "System Volume Information"
    - "Program Files"
    - "Program Files (x86)"
    - .git
    - node_modules
    - __pycache__
    - .venv
    - venv
    - env
    - .cache
    - AppData\Local\Temp
    - AppData\Local\Microsoft
    - AppData\Roaming\Microsoft
    - site-packages
    - dist-info
    - dist
    - build
    - .next
    - .nuxt
  priority_paths:
    - C:\AI\readme
    - C:\AI\AI-Memory-Hub
    - C:\AI\docs
    - C:\AI\npu
    - C:\AI\apps\control-center
    - C:\AI\apps\vivo-embed\src
    - C:\AI\Claude-Coder-Config
    - C:\Users\istva\free-claude-code
    - C:\Users\istva\AppData\Local\hermes
    - C:\AI\AI-hub
  extensions:
    docs: [.pdf, .docx, .doc, .txt, .rtf]
    code: [.py, .ts, .js, .ps1, .bat, .sh, .rs, .go, .cs]
    notes: [.md, .markdown, .org, .rst]
    system: [.yaml, .yml, .json, .toml, .ini, .conf]
  max_file_size_mb: 5
  min_file_size_bytes: 100

chunker:
  chunk_size: 512
  chunk_overlap: 64

api:
  host: 0.0.0.0
  port: 7272

mcp:
  transport: stdio
  server_name: vivo-embed

schedule:
  daily_reindex_hour: 3
  incremental_interval_minutes: 60
